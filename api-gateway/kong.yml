_format_version: "3.0"
_transform: true

# Modo declarativo (DB-less). Para alta disponibilidad futura, añade mas
# targets bajo cada upstream, ej:
#   docker compose up --scale auth-service=2
# y agrega el nuevo target (host:puerto del nuevo contenedor) a la lista.

# Global (sin service/route asociado): aplica a toda la API. X-Content-Type-Options
# y X-Frame-Options no hacen falta aca -Spring Security ya los manda por default en
# cada microservicio-, pero HSTS y CSP no los manda nadie todavia. CSP minimo porque
# esto es JSON/WebSocket, no HTML: no hay recursos que cargar, es solo defensa en
# profundidad por si algo alguna vez confunde el content-type.
plugins:
  - name: response-transformer
    config:
      add:
        headers:
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains"
          - "Content-Security-Policy:default-src 'none'"

upstreams:
  - name: auth-service-upstream
    algorithm: round-robin
    targets:
      - target: auth-service:8081
        weight: 100
  - name: room-service-upstream
    algorithm: round-robin
    targets:
      - target: room-service:8082
        weight: 100
  - name: realtime-service-upstream
    algorithm: round-robin
    targets:
      - target: realtime-service:8083
        weight: 100
  - name: reporting-service-upstream
    algorithm: round-robin
    targets:
      - target: reporting-service:8084
        weight: 100
  - name: vision-service-upstream
    algorithm: round-robin
    targets:
      - target: vision-service:8085
        weight: 100

services:
  - name: auth-service
    host: auth-service-upstream
    port: 8081
    protocol: http
    routes:
      - name: auth-service-route
        paths:
          - /api/auth
        strip_path: false

  - name: room-service
    host: room-service-upstream
    port: 8082
    protocol: http
    routes:
      - name: room-service-route
        paths:
          - /api/salas
        strip_path: false

  # realtime-service atiende tanto los sub-recursos REST de /api/salas/{id}/...
  # (canales -incluye mensajes por canal-, marcadores, rutas, alertas) como el
  # endpoint WebSocket /ws.
  # Se declaran rutas separadas y mas especificas que room-service-route para
  # que Kong las matchee con prioridad (mayor cantidad de segmentos = mayor
  # prioridad de regex/prefix en Kong).
  - name: realtime-service
    host: realtime-service-upstream
    port: 8083
    protocol: http
    routes:
      - name: realtime-canales-route
        paths:
          - "~/api/salas/[^/]+/canales"
        strip_path: false
      - name: realtime-marcadores-route
        paths:
          - "~/api/salas/[^/]+/marcadores"
        strip_path: false
      - name: realtime-rutas-route
        paths:
          - "~/api/salas/[^/]+/rutas"
        strip_path: false
      - name: realtime-alertas-route
        paths:
          - "~/api/salas/[^/]+/alertas"
        strip_path: false
      - name: realtime-ws-route
        paths:
          - /ws
        strip_path: false

  - name: reporting-service
    host: reporting-service-upstream
    port: 8084
    protocol: http
    routes:
      - name: reporting-service-route
        paths:
          - /api/reportes
        strip_path: false

  # vision-service (FastAPI) sirve /predict y /health en la raiz, no bajo
  # /api/vision como mapean los controllers de Spring sus propios prefijos.
  # Por eso esta es la unica ruta con strip_path: true:
  #   /api/vision/predict -> /predict ; /api/vision/health -> /health
  - name: vision-service
    host: vision-service-upstream
    port: 8085
    protocol: http
    routes:
      - name: vision-service-route
        paths:
          - /api/vision
        strip_path: true

  # Health check para el ALB: /health -> actuator de auth-service.
  # Valida que Kong este arriba Y que al menos un microservicio responda.
  - name: health-check
    host: auth-service-upstream
    port: 8081
    protocol: http
    path: /actuator/health
    routes:
      - name: health-route
        paths:
          - /health
        strip_path: true
