_format_version: "3.0"
_transform: true

# Modo declarativo (DB-less). Para alta disponibilidad futura, añade mas
# targets bajo cada upstream, ej:
#   docker compose up --scale auth-service=2
# y agrega el nuevo target (host:puerto del nuevo contenedor) a la lista.

upstreams:
  - name: auth-service-upstream
    algorithm: round-robin
    targets:
      - target: auth-service:8081
        weight: 100
  - name: room-service-upstream
    algorithm: round-robin
    targets:
      - target: room-service:8082
        weight: 100
  - name: realtime-service-upstream
    algorithm: round-robin
    targets:
      - target: realtime-service:8083
        weight: 100
  - name: reporting-service-upstream
    algorithm: round-robin
    targets:
      - target: reporting-service:8084
        weight: 100

services:
  - name: auth-service
    host: auth-service-upstream
    port: 8081
    protocol: http
    routes:
      - name: auth-service-route
        paths:
          - /api/auth
        strip_path: false

  - name: room-service
    host: room-service-upstream
    port: 8082
    protocol: http
    routes:
      - name: room-service-route
        paths:
          - /api/salas
        strip_path: false

  # realtime-service atiende tanto los sub-recursos REST de /api/salas/{id}/...
  # (mensajes, marcadores, rutas, alertas) como el endpoint WebSocket /ws.
  # Se declaran rutas separadas y mas especificas que room-service-route para
  # que Kong las matchee con prioridad (mayor cantidad de segmentos = mayor
  # prioridad de regex/prefix en Kong).
  - name: realtime-service
    host: realtime-service-upstream
    port: 8083
    protocol: http
    routes:
      - name: realtime-mensajes-route
        paths:
          - "~/api/salas/[^/]+/mensajes"
        strip_path: false
      - name: realtime-marcadores-route
        paths:
          - "~/api/salas/[^/]+/marcadores"
        strip_path: false
      - name: realtime-rutas-route
        paths:
          - "~/api/salas/[^/]+/rutas"
        strip_path: false
      - name: realtime-alertas-route
        paths:
          - "~/api/salas/[^/]+/alertas"
        strip_path: false
      - name: realtime-ws-route
        paths:
          - /ws
        strip_path: false

  - name: reporting-service
    host: reporting-service-upstream
    port: 8084
    protocol: http
    routes:
      - name: reporting-service-route
        paths:
          - /api/reportes
        strip_path: false
