x-jwt-secret: &jwt-secret "orcalab-dev-secret-cambiar-en-produccion-minimo-256-bits-de-largo"

services:
  # ---------------------------------------------------------------------
  # Bases de datos + Redis
  # ---------------------------------------------------------------------
  auth-db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [orcalab-net]

  room-db:
    image: postgres:16
    container_name: room-db
    environment:
      POSTGRES_DB: room_db
      POSTGRES_USER: room_user
      POSTGRES_PASSWORD: room_password
    ports:
      - "5434:5432"
    volumes:
      - room-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U room_user -d room_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [orcalab-net]

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [orcalab-net]

  realtime-mongo:
    image: mongo:7
    container_name: realtime-mongo
    ports:
      - "27019:27017"
    volumes:
      - realtime-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [orcalab-net]

  reporting-mongo:
    image: mongo:7
    container_name: reporting-mongo
    ports:
      - "27020:27017"
    volumes:
      - reporting-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [orcalab-net]

  # ---------------------------------------------------------------------
  # Microservicios Spring Boot
  # ---------------------------------------------------------------------
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      DB_HOST: auth-db
      DB_PORT: "5432"
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_password
      JWT_SECRET: *jwt-secret
      ADMIN_SEED_EMAIL: admin@orcalab.local
      ADMIN_SEED_PASSWORD: OrcaAdmin123!
      ADMIN_SEED_NOMBRE: Administrador OrcaLab
    ports:
      - "8081:8081"
    volumes:
      - auth-service-logs:/app/logs
    depends_on:
      auth-db:
        condition: service_healthy
    networks: [orcalab-net]

  room-service:
    build:
      context: ./room-service
    container_name: room-service
    environment:
      DB_HOST: room-db
      DB_PORT: "5432"
      DB_USERNAME: room_user
      DB_PASSWORD: room_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: *jwt-secret
    ports:
      - "8082:8082"
    volumes:
      - room-service-logs:/app/logs
    depends_on:
      room-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [orcalab-net]

  realtime-service:
    build:
      context: ./realtime-service
    container_name: realtime-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MONGO_HOST: realtime-mongo
      MONGO_PORT: "27017"
      JWT_SECRET: *jwt-secret
      ROOM_SERVICE_URL: http://room-service:8082
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8083:8083"
    volumes:
      - realtime-service-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      realtime-mongo:
        condition: service_healthy
    networks: [orcalab-net]

  # Segunda replica de realtime-service, misma imagen/Redis/Mongo que la de
  # arriba, solo para probar en local que el relay Redis Pub/Sub
  # (RealtimeBroadcaster/RealtimeBroadcastSubscriber) propaga mensajes STOMP
  # entre instancias distintas. NO se usa en produccion (el ASG real sigue en
  # 1 sola instancia hasta que esto se valide y se despliegue). Comentar o
  # quitar este servicio si no se esta probando escalado horizontal.
  realtime-service-b:
    build:
      context: ./realtime-service
    container_name: realtime-service-b
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MONGO_HOST: realtime-mongo
      MONGO_PORT: "27017"
      JWT_SECRET: *jwt-secret
      ROOM_SERVICE_URL: http://room-service:8082
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8093:8083"
    depends_on:
      redis:
        condition: service_healthy
      realtime-mongo:
        condition: service_healthy
    networks: [orcalab-net]

  reporting-service:
    build:
      context: ./reporting-service
    container_name: reporting-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MONGO_HOST: reporting-mongo
      MONGO_PORT: "27017"
      JWT_SECRET: *jwt-secret
      ROOM_SERVICE_URL: http://room-service:8082
      AUTH_SERVICE_URL: http://auth-service:8081
      REALTIME_SERVICE_URL: http://realtime-service:8083
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8084:8084"
    volumes:
      - reporting-service-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      reporting-mongo:
        condition: service_healthy
    networks: [orcalab-net]

  # Clasificador de cetáceos (Python/FastAPI + ONNX). Primer servicio no-Java.
  # Aún sin ruta en Kong (kong.yml es compartido con prod); se prueba directo
  # por el 8085.
  vision-service:
    build:
      context: ./vision-service
    container_name: vision-service
    environment:
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8085:8085"
    networks: [orcalab-net]

  # ---------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------
  kong:
    image: kong:latest
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: info
    volumes:
      - ./api-gateway/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - auth-service
      - room-service
      - realtime-service
      - reporting-service
    networks: [orcalab-net]

  # ---------------------------------------------------------------------
  # Observabilidad (config fusionada desde observability-service/)
  # ---------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability-service/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - room-service
      - realtime-service
      - reporting-service
    networks: [orcalab-net]

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability-service/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    networks: [orcalab-net]

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability-service/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - auth-service-logs:/var/log/orcalab/auth-service/logs
      - room-service-logs:/var/log/orcalab/room-service/logs
      - realtime-service-logs:/var/log/orcalab/realtime-service/logs
      - reporting-service-logs:/var/log/orcalab/reporting-service/logs
    depends_on:
      - loki
    networks: [orcalab-net]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability-service/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks: [orcalab-net]

networks:
  orcalab-net:
    driver: bridge

volumes:
  auth-db-data:
  room-db-data:
  realtime-mongo-data:
  reporting-mongo-data:
  grafana-data:
  auth-service-logs:
  room-service-logs:
  realtime-service-logs:
  reporting-service-logs:
