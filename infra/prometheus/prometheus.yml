global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']
  - job_name: 'room-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['room-service:8082']
  - job_name: 'realtime-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['realtime-service:8083']
  - job_name: 'reporting-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['reporting-service:8084']
  - job_name: 'observability-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['observability-service:8085']
