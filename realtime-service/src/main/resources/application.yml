server:
  port: 8083

spring:
  application:
    name: realtime-service
  data:
    redis:
      host: redis
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  websocket:
    endpoint: /ws
  redis:
    channel: realtime-events