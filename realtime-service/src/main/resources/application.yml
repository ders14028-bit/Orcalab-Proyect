server:
  port: 8083

spring:
  application:
    name: realtime-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/orcalab_realtime
    redis:
      host: localhost
      port: 6379

orcalab:
  jwt:
    secret: ${JWT_SECRET:change-me-for-local-development}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
