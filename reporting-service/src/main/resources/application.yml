server:
  port: 8084

spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://localhost:5435/reporting_db
    username: orcalab
    password: orcalab
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

orcalab:
  jwt:
    secret: ${JWT_SECRET:change-me-for-local-development}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
