server:
  port: 8084

spring:
  application:
    name: reporting-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27020}/reporting_db

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  events:
    room-topic: room-events
    realtime-topic: realtime-events
  security:
    jwt:
      secret: ${JWT_SECRET:orcalab-dev-secret-cambiar-en-produccion-minimo-256-bits-de-largo}
  services:
    room-service-url: ${ROOM_SERVICE_URL:http://localhost:8082}
    auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    realtime-service-url: ${REALTIME_SERVICE_URL:http://localhost:8083}
  cors:
    # Lista separada por comas. Default: puerto por defecto de Vite, para dev local.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'