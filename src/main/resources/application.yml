server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: orcalab
    password: orcalab
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

orcalab:
  jwt:
    # En produccion esto va por variable de entorno / secret manager, NUNCA hardcoded.
    secret: ${JWT_SECRET:orcalab-dev-secret-cambiar-en-produccion-minimo-32-bytes}
    expiration-ms: 3600000   # 1 hora

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: auth-service

logging:
  level:
    com.orcalab.auth: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
